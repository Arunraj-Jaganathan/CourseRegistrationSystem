<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrolled Students</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="index.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --accent: #5af5c8;
            --text: #f0f0f0;
            --muted: #888;
            --border: #2a2a2a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            padding: 24px 16px;
        }

        .container { max-width: 860px; margin: 0 auto; }

        .back {
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 32px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .back:hover { color: var(--accent); }

        .page-header { margin: 24px 0 32px; }

        .tag {
            display: inline-block;
            background: rgba(90,245,200,0.12);
            color: var(--accent);
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: 100px;
            margin-bottom: 14px;
            border: 1px solid rgba(90,245,200,0.2);
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            font-weight: 800;
        }

        h1 span { color: var(--accent); }

        .table-wrap {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }

        thead tr { background: #222; }

        th {
            padding: 14px 20px;
            text-align: left;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 500;
        }

        td {
            padding: 16px 20px;
            font-size: 14px;
            border-top: 1px solid var(--border);
        }

        tbody tr:hover { background: #1f1f1f; }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(90,245,200,0.15);
            color: var(--accent);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            margin-right: 10px;
            vertical-align: middle;
        }

        .badge {
            background: rgba(90,245,200,0.12);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 12px;
        }

        /* Mobile Cards */
        .mobile-cards { display: none; }

        .student-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
        }

        .student-card-header {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
        }

        .student-card-name {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
        }

        .student-card-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .student-card-label { color: var(--muted); }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--muted);
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .table-wrap { display: none; }
            .mobile-cards { display: block; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back">← Back to Home</a>

        <div class="page-header">
            <div class="tag">✦ Students</div>
            <h1>Enrolled <span>Students</span></h1>
        </div>

        <!-- Desktop Table -->
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Course</th>
                    </tr>
                </thead>
                <tbody id="enrolledtable">
                    <tr><td colspan="4" class="loading">Loading students...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Mobile Cards -->
        <div class="mobile-cards" id="mobilestudents">
            <div class="loading">Loading students...</div>
        </div>
    </div>

    <script>
        window.onload = function() {
            fetch("https://courseregistrationsystem-7kon.onrender.com/courses/enrolled")
                .then(r => r.json())
                .then(students => {
                    let table = document.getElementById("enrolledtable");
                    let mobile = document.getElementById("mobilestudents");
                    table.innerHTML = "";
                    mobile.innerHTML = "";

                    if (students.length === 0) {
                        table.innerHTML = `<tr><td colspan="4" class="loading">No students enrolled yet.</td></tr>`;
                        mobile.innerHTML = `<div class="loading">No students enrolled yet.</div>`;
                        return;
                    }

                    students.forEach(s => {
                        const initial = s.name ? s.name.charAt(0).toUpperCase() : '?';
                        table.innerHTML += `<tr>
                            <td>${s.id}</td>
                            <td><span class="avatar">${initial}</span>${s.name}</td>
                            <td>${s.emailId}</td>
                            <td><span class="badge">${s.courseName}</span></td>
                        </tr>`;

                        mobile.innerHTML += `<div class="student-card">
                            <div class="student-card-header">
                                <span class="avatar">${initial}</span>
                                <span class="student-card-name">${s.name}</span>
                            </div>
                            <div class="student-card-row"><span class="student-card-label">ID</span><span>${s.id}</span></div>
                            <div class="student-card-row"><span class="student-card-label">Email</span><span>${s.emailId}</span></div>
                            <div class="student-card-row"><span class="student-card-label">Course</span><span class="badge">${s.courseName}</span></div>
                        </div>`;
                    });
                })
                .catch(() => {
                    document.getElementById("enrolledtable").innerHTML = `<tr><td colspan="4" class="loading">Failed to load students.</td></tr>`;
                });
        }
    </script>
</body>
</html>
