<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register a Course</title>
    <script src="index.js"></script>
    <style>
        body {
            background-color: rgb(35, 34, 34);
            text-align: center;
        }
        form {
            margin: auto;
            padding: 20px;
            width: 400px;
            background-color: #fff;
            border-radius: 5px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            font-weight: bold;
            font-size: medium;
            cursor: pointer;
            width: 80%;
            height: 30px;
            border-radius: 5px;
            border: none;
        }
        input, select {
            width: 80%;
            height: 30px;
        }
        button:hover {
            background-color: #104212;
        }
    </style>
</head>
<body>
    <h2 style="color: rgb(254, 254, 0)">Enroll Your Course</h2>

    <form onsubmit="registerCourse(event)">
        <label for="name">Enter your Name:</label><br>
        <input type="text" name="name"><br><br>

        <label for="email">Enter your EmailID:</label><br>
        <input type="email" name="emailId"><br><br>

        <label for="course">Choose a Course:</label><br>
        <select id="courseName" name="courseName">
            <option value="Java">Java</option>
            <option value="Python for ML">Python for ML</option>
            <option value="Spring Boot">Spring Boot</option>
        </select><br><br>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
